<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ludo Tonight ❤️</title>

<style>

body{

margin:0;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);

font-family:Arial;

}

#box{

text-align:center;
color:white;

}

h1{

font-size:35px;
transition:.5s;

}

.grow{

animation:grow 3s forwards;

}

@keyframes grow{

from{

transform:scale(1);

}

to{

transform:scale(2);

}

}

#ghost{

display:none;
font-size:80px;

animation:ghost 2s infinite alternate;

}

@keyframes ghost{

from{

transform:translateY(-10px);

}

to{

transform:translateY(10px);

}

}

#ros{

display:none;

font-size:120px;

animation:float 2s infinite alternate;

}

@keyframes float{

from{

transform:translateY(-10px);

}

to{

transform:translateY(10px);

}

}

button{

padding:15px 30px;

font-size:20px;

margin:10px;

border:none;

border-radius:30px;

cursor:pointer;

}

#yes{

background:green;

color:white;

}

#no{

background:red;

color:white;

position:absolute;

display:none;

}

#buttons{

display:none;

}

</style>

</head>

<body>

<div id="box">

<div id="ghost">👻</div>

<div id="ros">🍡</div>

<h1 id="text">

Hello Gaureyyyyyy.... ❤️

</h1>

<div id="buttons">

<button id="yes">

Yes ❤️

</button>

<button id="no">

No 😝

</button>

</div>

</div>

<script>

const text=document.getElementById("text");

const ghost=document.getElementById("ghost");

const ros=document.getElementById("ros");

const buttons=document.getElementById("buttons");

const yes=document.getElementById("yes");

const no=document.getElementById("no");

text.classList.add("grow");
setTimeout(()=>{

text.classList.remove("grow");

ghost.style.display="block";

text.innerHTML="Ek atrupta aatma";

},3000);

setTimeout(()=>{

ghost.style.display="none";

ros.style.display="block";

text.innerHTML="Amor Rosogolla";

},6000);

setTimeout(()=>{

ros.style.display="none";

text.innerHTML="Will you like to play Ludo tonight? 🎲❤️";

buttons.style.display="block";

no.style.display="inline-block";

no.style.left="55%";

no.style.top="65%";

},9000);

function moveNo(){

let x=Math.random()*(window.innerWidth-120);

let y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";

no.style.top=y+"px";

}

no.addEventListener("mouseover",moveNo);

no.addEventListener("click",moveNo);

yes.onclick=function(){

document.body.innerHTML=

"<div style='display:flex;height:100vh;justify-content:center;align-items:center;flex-direction:column;background:#ffb6d9;font-family:Arial;text-align:center;'>"+

"<h1>🎉 Yayyyyy ❤️</h1>"+

"<h2>Be ready at <span style=color:red>10:30 PM</span> tonight.</h2>"+

"<h2>I'll be waiting for you 🎲🥰</h2>"+

"</div>";
</script>

</body>
</html>
};
