<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ludo Tonight ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
text-align:center;
padding:20px;
position:relative;
width:100%;
}

#message{
font-size:32px;
font-weight:bold;
color:white;
transition:.8s;
}

.grow{
animation:grow 3s forwards;
}

@keyframes grow{
0%{transform:scale(1);}
100%{transform:scale(2.4);}
}

#ghost{
font-size:70px;
position:absolute;
left:-100px;
top:40%;
display:none;
animation:ghostMove 3s forwards;
}

@keyframes ghostMove{
to{
left:50%;
transform:translateX(-50%);
}
}

#rosogolla{
font-size:120px;
opacity:.18;
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
display:none;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateX(-50%) translateY(0);}
to{transform:translateX(-50%) translateY(-15px);}
}

#buttons{
display:none;
margin-top:35px;
}

button{
padding:15px 28px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
margin:12px;
transition:.3s;
}

#yes{
background:#00c853;
color:white;
}

#no{
background:#ff1744;
color:white;
position:absolute;
}

font-size:25px;

opacity:.
